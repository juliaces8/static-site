<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrument World Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Custom Hover Effect as requested */
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-10px); /* Lifts the card */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2) !important;
        }
        /* Image hover effect */
        .product-card img {
            transition: transform 0.5s ease;
            height: 250px;
            object-fit: contain;
        }
        .product-card:hover img {
            transform: scale(1.1); /* Zooms the instrument slightly */
        }
    </style>
</head>
<body class="bg-light">

    <header class="bg-dark py-5 mb-5 text-center">
        <h1 class="display-1 fw-bold" style="color: #baa44a !important;">Instrument World Store</h1>

    </header>

            </div>

                    <div class="card-body d-flex flex-column text-center">

                <div class="col-md-8">
                    <h5 class="display-5 mb-4 fw-bold">Contact Us!</h5>
                    <form class="row g-3">

                        </div>
                        <div class="col-md-6">
                            <input type="email" class="form-control form-control-lg border-2" placeholder="Email Address">
                        </div>
                        <div class="col-12">
                            <textarea class="form-control border-2" rows="4" placeholder="How can we help you?"></textarea>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold">SEND MESSAGE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
